<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>肚肚直播日历</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:#0d0d0d !important; }
body { background:#0d0d0d !important; color:#f5e6d3; font-family:'Noto Serif SC','Source Han Serif SC',Georgia,serif; min-height:100vh; }
.wrap { max-width:460px; margin:0 auto; padding:20px 12px; background:#0d0d0d; min-height:100vh; }
.header { text-align:center; margin-bottom:24px; }
.subtitle { font-size:10px; letter-spacing:5px; color:rgba(245,230,211,0.35); margin-bottom:4px; }
.month-nav { display:flex; align-items:center; justify-content:center; gap:20px; }
.month-nav button { background:none; border:none; color:rgba(245,230,211,0.4); font-size:18px; cursor:pointer; padding:4px 8px; font-family:inherit; }
.month-num { font-size:32px; font-weight:900; color:#f5e6d3; }
.month-label { font-size:13px; color:rgba(245,230,211,0.35); margin-left:4px; }
.stats { font-size:11px; color:rgba(245,230,211,0.3); margin-top:4px; }
.tags { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:16px; }
.tag { font-size:10px; padding:2px 8px; border-radius:20px; }
.weekdays, .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.weekdays { margin-bottom:4px; }
.weekdays div { text-align:center; font-size:10px; color:rgba(245,230,211,0.25); padding:4px 0; }
.grid { position:relative; margin-bottom:20px; }
.cell { min-height:52px; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; border:1px solid transparent; transition:all 0.15s ease; }
.cell.has-event { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.08); cursor:pointer; }
.cell.selected { background:rgba(232,168,124,0.22); border-color:rgba(232,168,124,0.6); }
.cell .day { font-size:14px; font-family:'JetBrains Mono','SF Mono',monospace; color:rgba(255,255,255,0.25); }
.cell.has-event .day { font-weight:700; color:#f5e6d3; }
.dot { width:5px; height:5px; border-radius:50%; margin-top:2px; }
.photo-dot { position:absolute; top:3px; right:3px; width:5px; height:5px; border-radius:50%; background:#7ce8a8; }

/* Popup */
.popup { position:absolute; background:#1a1a1a; border:1px solid rgba(255,255,255,0.12); border-radius:12px; overflow:hidden; z-index:50; box-shadow:0 12px 40px rgba(0,0,0,0.7); display:flex; flex-direction:row; max-width:300px; animation:popIn 0.2s ease; }
@keyframes popIn { from{opacity:0;transform:scale(0.92) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }
.popup-info { padding:10px 8px 10px 10px; display:flex; flex-direction:column; justify-content:center; }
.popup-date { font-size:18px; font-weight:900; font-family:'JetBrains Mono',monospace; line-height:1; }
.popup-session { font-size:8px; color:rgba(245,230,211,0.3); }
.popup-title { font-size:12px; font-weight:700; line-height:1.35; margin-bottom:4px; }
.popup-tags { display:flex; gap:3px; flex-wrap:wrap; }
.popup-tag { font-size:8px; padding:1px 5px; border-radius:20px; }
.popup-photo { width:90px; flex-shrink:0; cursor:pointer; position:relative; overflow:hidden; }
.popup-photo img { width:100%; height:100%; object-fit:cover; display:block; }
.popup-photo-count { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.6); border-radius:10px; padding:1px 6px; font-size:9px; color:#fff; }
.popup-close { position:absolute; top:4px; background:none; border:none; color:rgba(245,230,211,0.25); font-size:14px; cursor:pointer; font-family:inherit; }
.popup-nophoto { font-size:9px; color:rgba(245,230,211,0.12); margin-top:6px; }
.backdrop { position:fixed; inset:0; z-index:45; }

/* Lightbox */
.lightbox { position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.94); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
.lightbox img { max-width:92vw; max-height:80vh; border-radius:8px; object-fit:contain; }
.lightbox-nav { display:flex; gap:20px; align-items:center; }
.lightbox-nav button { background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:22px; width:40px; height:40px; border-radius:50%; cursor:pointer; font-family:inherit; }
.lightbox-nav span { color:rgba(255,255,255,0.5); font-size:12px; }

/* Event list */
.list { background:rgba(255,255,255,0.03); border-radius:14px; padding:14px; border:1px solid rgba(255,255,255,0.06); }
.list-title { font-size:11px; color:rgba(245,230,211,0.35); margin-bottom:10px; letter-spacing:2px; }
.list-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; }
.list-day { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; min-width:24px; text-align:right; }
.list-info { flex:1; }
.list-info-title { font-size:13px; font-weight:600; line-height:1.4; }
.list-info-sub { font-size:10px; color:rgba(245,230,211,0.35); }
.list-arrow { color:rgba(245,230,211,0.15); font-size:13px; }

.footer { text-align:center; margin-top:28px; font-size:9px; color:rgba(245,230,211,0.12); letter-spacing:2px; }
.empty { text-align:center; padding:40px 0; color:rgba(245,230,211,0.2); font-size:12px; }
</style>
</head>

};

function getTagStyle(tags) {
  for (const t of tags) if (TAG_COLORS[t]) return TAG_COLORS[t];
  return {bg:"#3a3a3a",text:"#ccc",dot:"#ccc"};
}

const WEEKDAYS = ["一","二","三","四","五","六","日"];
function daysInMonth(y,m) { return new Date(y,m,0).getDate(); }
function firstDayOfWeek(y,m) { const d=new Date(y,m-1,1).getDay(); return d===0?6:d-1; }

// ========== STATE ==========
let state = { year:2026, month:1, selected:null, lightboxIdx:null, lightboxPhotos:null };

function getKey() { return `${state.year}-${String(state.month).padStart(2,'0')}`; }
function getEvents() { return EVENTS[getKey()] || []; }
function getEventMap() { const m={}; getEvents().forEach(e=>{m[e.day]=e;}); return m; }

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  const events = getEvents();
  const eventMap = getEventMap();
  const dim = daysInMonth(state.year, state.month);
  const fd = firstDayOfWeek(state.year, state.month);
  const monthStats = events.length;

  // Tag counts
  const tagCounts = {};
  events.forEach(e => e.tags.forEach(t => { tagCounts[t]=(tagCounts[t]||0)+1; }));

  let html = '';

  // Header
  html += `<div class="header">
    <div class="subtitle">肚肚直播日历</div>
    <div class="month-nav">
      <button onclick="prevMonth()">‹</button>
      <div><span class="month-num">${state.month}</span><span class="month-label">月 ${state.year}</span></div>
      <button onclick="nextMonth()">›</button>
    </div>
    ${monthStats > 0 ? `<div class="stats">本月 ${monthStats} 场直播</div>` : ''}
  </div>`;

  // Weekdays
  html += '<div class="weekdays">';
  WEEKDAYS.forEach(w => { html += `<div>${w}</div>`; });
  html += '</div>';

  // Grid
  html += '<div class="grid" id="grid">';
  for (let i=0; i<fd; i++) html += '<div class="cell"></div>';
  for (let d=1; d<=dim; d++) {
    const ev = eventMap[d];
    const isSel = state.selected === d;
    const ts = ev ? getTagStyle(ev.tags) : null;
    const hasPhotos = ev && ev.photos && ev.photos.length > 0;
    let cls = 'cell';
    if (ev) cls += ' has-event';
    if (isSel) cls += ' selected';
    html += `<div class="${cls}" id="cell-${d}" ${ev ? `onclick="selectDay(${d})"` : ''}>`;
    html += `<span class="day">${d}</span>`;
    if (ev) html += `<div class="dot" style="background:${ts.dot};box-shadow:0 0 6px ${ts.dot}55"></div>`;
    if (hasPhotos) html += '<div class="photo-dot"></div>';
    html += '</div>';
  }

  // Popup inside grid
  if (state.selected && eventMap[state.selected]) {
    const ev = eventMap[state.selected];
    const ts = getTagStyle(ev.tags);
    const photos = ev.photos || [];
    // Position will be set after render via JS
    html += `<div class="popup" id="popup" style="visibility:hidden">`;
    html += `<div class="popup-info">`;
    html += `<div style="display:flex;align-items:baseline;gap:4px;margin-bottom:2px">`;
    html += `<span class="popup-date" style="color:${ts.text}">${state.selected}</span>`;
    html += `<span class="popup-session">${ev.session}</span>`;
    html += `</div>`;
    html += `<div class="popup-title">${ev.title}</div>`;
    html += `<div class="popup-tags">`;
    ev.tags.forEach(tag => {
      const s = TAG_COLORS[tag] || {bg:"#3a3a3a",text:"#ccc"};
      html += `<span class="popup-tag" style="background:${s.bg};color:${s.text}">${tag}</span>`;
    });
    html += '</div>';
    if (photos.length === 0) html += '<div class="popup-nophoto">暂无照片</div>';
    html += '</div>';
    if (photos.length > 0) {
      html += `<div class="popup-photo" onclick="openLightbox(${state.selected}, 0)">`;
      html += `<img src="${photos[0]}" alt="">`;
      if (photos.length > 1) html += `<div class="popup-photo-count">${photos.length}张</div>`;
      html += '</div>';
    }
    html += `<button class="popup-close" style="right:${photos.length > 0 ? '94px' : '4px'}" onclick="closePopup()">×</button>`;
    html += '</div>';
  }

  html += '</div>'; // end grid

  // Backdrop
  if (state.selected) {
    html += '<div class="backdrop" onclick="closePopup()"></div>';
  }

  if (monthStats === 0) html += '<div class="empty">本月暂无直播记录</div>';
  html += '<div class="footer">点击有标记的日期查看详情</div>';

  app.innerHTML = html;

  // Position popup after DOM is ready
  if (state.selected && eventMap[state.selected]) {
    requestAnimationFrame(() => positionPopup());
  }

  // Render lightbox
  renderLightbox();
}

function positionPopup() {
  const popup = document.getElementById('popup');
  const cell = document.getElementById('cell-' + state.selected);
  const grid = document.getElementById('grid');
  if (!popup || !cell || !grid) return;
  const cr = cell.getBoundingClientRect();
  const gr = grid.getBoundingClientRect();
  let left = cr.left - gr.left;
  const popW = popup.offsetWidth || 280;
  if (left + popW > gr.width) left = gr.width - popW;
  if (left < 0) left = 0;
  const cellBottom = cr.bottom - gr.top;
  const cellTop = cr.top - gr.top;
  const spaceBelow = gr.height - cellBottom;
  if (spaceBelow > 160) {
    popup.style.top = (cellBottom + 8) + 'px';
    popup.style.bottom = 'auto';
  } else {
    popup.style.bottom = (grid.scrollHeight - cellTop + 8) + 'px';
    popup.style.top = 'auto';
  }
  popup.style.left = left + 'px';
  popup.style.visibility = 'visible';
}

function renderLightbox() {
  let existing = document.getElementById('lightbox');
  if (existing) existing.remove();
  if (!state.lightboxPhotos || state.lightboxPhotos.length === 0) return;
  const photos = state.lightboxPhotos;
  const idx = state.lightboxIdx || 0;
  const div = document.createElement('div');
  div.id = 'lightbox';
  div.className = 'lightbox';
  div.onclick = (e) => { if (e.target === div) closeLightbox(); };
  let lhtml = `<img src="${photos[idx]}" onclick="event.stopPropagation()">`;
  if (photos.length > 1) {
    lhtml += `<div class="lightbox-nav" onclick="event.stopPropagation()">
      <button onclick="lbPrev()">‹</button>
      <span>${idx+1}/${photos.length}</span>
      <button onclick="lbNext()">›</button>
    </div>`;
  }
  div.innerHTML = lhtml;
  document.body.appendChild(div);
}

// ========== ACTIONS ==========
function selectDay(d) {
  if (state.selected === d) { state.selected = null; }
  else { state.selected = d; }
  render();
}
function closePopup() { state.selected = null; render(); }
function prevMonth() { if(state.month===1){state.year--;state.month=12}else state.month--; state.selected=null; render(); }
function nextMonth() { if(state.month===12){state.year++;state.month=1}else state.month++; state.selected=null; render(); }

function openLightbox(day, idx) {
  const ev = getEventMap()[day];
  if (!ev || !ev.photos || ev.photos.length === 0) return;
  state.lightboxPhotos = ev.photos;
  state.lightboxIdx = idx;
  renderLightbox();
}
function closeLightbox() { state.lightboxPhotos = null; state.lightboxIdx = null; renderLightbox(); }
function lbPrev() {
  const len = state.lightboxPhotos.length;
  state.lightboxIdx = (state.lightboxIdx - 1 + len) % len;
  renderLightbox();
}
function lbNext() {
  const len = state.lightboxPhotos.length;
  state.lightboxIdx = (state.lightboxIdx + 1) % len;
  renderLightbox();
}

// ========== INIT ==========
render();
</script>
</body>
</html>
